# =============================================================================
# CarbonThreat — Docker Compose
#
# Quick start (local MVP / Production):
#   cp minimal.env .env            # edit DB_USER / DB_PASSWORD if desired
#   ./scripts/gen-local-certs.sh   # generate self-signed certs (only needed if APP_USE_TLS=true)
#   docker compose up --build -d
#
# The app will be available natively at https://localhost:3001 (if APP_USE_TLS=true)
# or http://localhost:3001 (if APP_USE_TLS=false).
#
# Development mode (Vite hot-reload):
#   docker compose --profile dev up --build
#   Frontend → http://localhost:3000  (Vite)
#   API      → https://localhost:3001  (Express Native TLS)
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:?DB_USER is required — see minimal.env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — see minimal.env}
      POSTGRES_DB:       ${DB_NAME:-carbonthreat}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-carbonthreat} -d ${DB_NAME:-carbonthreat}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Express API + built React SPA ──────────────────────────────────────────
  carbonthreat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Always connect to the Docker-internal db hostname, regardless of what .env says
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-carbonthreat}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3001"
    ports:
      - "3001:3001"
    volumes:
      - ct_secrets:/app/secrets
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate -qO- https://127.0.0.1:3001/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Vite dev server (development only — docker compose --profile dev up) ───
  # Hot-reloads ct.client source; proxies /api/* to the Express backend.
  client:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./ct.client:/app
      - /app/node_modules          # isolate container node_modules
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: https://carbonthreat:3001
    depends_on:
      - carbonthreat
    profiles:
      - dev

volumes:
  pgdata:
  ct_secrets:
